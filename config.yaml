site:
  name: "dotne1"
  title: "Cybersecurity Portfolio"
  description: "Cybersecurity portfolio and resource hub"
  author: "dotne1"
  url: "https://dotne1.com"
  copyright_year: 2026

paths:
  templates: "templates"
  static: "."
  output: "."

nvd:
  api_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  db_file: "nvd_disclosures.db"
  fetch_interval_hours: 1
  results_per_page: 2000

automation:
  poll_interval_seconds: 60
  github_repo: "https://github.com/dotne1/dotne1.github.io"
  github_branch: "main"

logging:
  level: "INFO"
  format: "[%(asctime)s] %(levelname)s: %(message)s"

feeds:
  cve_limit: 20
  timezone: "America/Chicago"
